name: Scrape and Enrich NRK Rettelser

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: nrk-rettelser
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit corrections_raw.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Scraper update: corrections_raw.json"
          file_pattern: data/corrections_raw.json

  enrich-qa:
    needs: scrape
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run enrichment + QA
        run: python enrich_qa.py

      - name: Commit enriched data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Enrichment + QA update"
          file_pattern: data/corrections_raw.json data/corrections.json
