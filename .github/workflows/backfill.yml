name: Backfill NRK corrections (one-time)
on:
  workflow_dispatch:   # manual trigger only — run once to populate historical data

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # up to 2 hours for full historical scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install beautifulsoup4 requests
      - run: python backfill.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Backfill: historical corrections from NRK search"
